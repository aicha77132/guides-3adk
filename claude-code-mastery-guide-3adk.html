  "PRO":          { bg: "#FFE0B2", text: "#E65100" },
  "NOUVEAU":      { bg: "#B3E5FC", text: "#01579B" },
  "ARCHITECTURE": { bg: "#D1C4E9", text: "#4527A0" },
  "FIABILITÉ":    { bg: "#DCEDC8", text: "#33691E" },
  "PRODUCTIVITÉ": { bg: "#FFF9C4", text: "#F9A825" },
  "PUISSANCE":    { bg: "#FFCDD2", text: "#B71C1C" },
  "CI/CD":        { bg: "#B2EBF2", text: "#006064" },
  "ÉCOSYSTÈME":   { bg: "#F0F4C3", text: "#827717" },
  "RÉFÉRENCE":    { bg: "#CFD8DC", text: "#37474F" },
  "TEMPLATE":     { bg: "#D7CCC8", text: "#4E342E" }
};

let activeSection = "foundation";
const openTips = {};

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function renderTip(tip, accent, idx) {
  const tipId = activeSection + "-" + idx;
  if (openTips[tipId] === undefined) openTips[tipId] = false;
  const isOpen = openTips[tipId];
  const pc = priorityColors[tip.priority] || { bg: "#E0E0E0", text: "#424242" };

  return `<div class="tip-card ${isOpen ? 'open' : ''}" 
    style="border-color:${isOpen ? accent : '#E0E0E0'};--accent-shadow:${accent}22;--accent:${accent}"
    onclick="toggleTip('${tipId}')">
    <div class="tip-header">
      <div class="tip-header-left">
        <span class="priority-badge" style="background:${pc.bg};color:${pc.text}">${escapeHtml(tip.priority)}</span>
        <span class="tip-title">${escapeHtml(tip.title)}</span>
      </div>
      <span class="tip-toggle ${isOpen ? 'open' : ''}">▼</span>
    </div>
    ${isOpen ? `<div class="tip-body">
      <p>${escapeHtml(tip.content)}</p>
      ${tip.code ? `<div class="code-block" id="code-${tipId}"><button class="copy-btn" onclick="event.stopPropagation();copyCode('${tipId}')">Copier</button>${escapeHtml(tip.code)}</div>` : ''}
      <div class="why-box" style="--accent:${accent};background:${accent}0A">
        <strong>💡 Pourquoi :</strong> ${escapeHtml(tip.why)}
      </div>
    </div>` : ''}
  </div>`;
}

function render() {
  const section = sections.find(s => s.id === activeSection);
  const totalTips = sections.reduce((a, s) => a + s.tips.length, 0);

  document.getElementById("tipCount").textContent = totalTips + " techniques pour exploiter Claude Code à sa pleine puissance";

  document.getElementById("nav").innerHTML = sections.map(s => {
    const isActive = s.id === activeSection;
    return `<button class="nav-btn ${isActive ? 'active' : ''}" 
      style="${isActive ? `background:${s.accent}` : ''}"
      onclick="setSection('${s.id}')">
      <span class="nav-icon">${s.icon}</span>
      <span>${escapeHtml(s.title)}</span>
    </button>`;
  }).join("");

  document.getElementById("content").innerHTML = `
    <div style="animation:fadeSlide 300ms ease-out">
      <div class="section-header">
        <div class="section-header-row">
          <span class="section-header-icon">${section.icon}</span>
          <div>
            <h2>${escapeHtml(section.title)}</h2>
            <p class="subtitle">${escapeHtml(section.subtitle)}</p>
          </div>
        </div>
        <div class="section-bar" style="background:${section.accent}"></div>
      </div>
      ${section.tips.map((t, i) => renderTip(t, section.accent, i)).join("")}
    </div>
  `;
}

function setSection(id) {
  activeSection = id;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleTip(tipId) {
  openTips[tipId] = !openTips[tipId];
  render();
}

function copyCode(tipId) {
  const el = document.getElementById("code-" + tipId);
  if (!el) return;
  const text = el.textContent.replace("Copier", "").replace("Copié ✓", "").trim();
  navigator.clipboard.writeText(text).then(() => {
    const btn = el.querySelector(".copy-btn");
    btn.textContent = "Copié ✓";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copier"; btn.classList.remove("copied"); }, 2000);
  });
}

render();
</script>
</body>
</html>
