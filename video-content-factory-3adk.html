// ─── STATE ────────────────────────────────────────────
let activePhase = "overview";
const openCards = {};

// ─── RENDER ───────────────────────────────────────────
function toolColor(tool) {
  if (tool === "Cowork") return "#059669";
  if (tool === "Claude Chat") return "#6366F1";
  return "#DC2626";
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function renderContent(text) {
  return text.split("\n").map(line => {
    if (line.startsWith("**") && line.endsWith("**")) {
      return `<span class="bold">${escapeHtml(line.replace(/\*\*/g, ""))}</span>`;
    }
    if (line.startsWith("→")) {
      return `<span class="arrow" style="color:var(--accent)">${escapeHtml(line)}</span>\n`;
    }
    return escapeHtml(line) + "\n";
  }).join("");
}

function renderBlock(block, accent, idx) {
  const cardId = activePhase + "-" + idx;
  if (openCards[cardId] === undefined) openCards[cardId] = true;
  const isOpen = openCards[cardId];

  if (block.type === "pipeline") {
    return `<div class="pipeline-card">
      <h3>${escapeHtml(block.title)}</h3>
      ${block.steps.map(s => {
        const tc = toolColor(s.tool);
        return `<div class="pipeline-step">
          <div class="step-num">${s.num}</div>
          <div class="step-info">
            <div class="step-meta">
              <span class="step-label">${escapeHtml(s.label)}</span>
              <span class="step-tool" style="background:${tc}15;color:${tc}">${escapeHtml(s.tool)}</span>
            </div>
            <div class="step-desc">${escapeHtml(s.desc)}</div>
          </div>
        </div>`;
      }).join("")}
    </div>`;
  }

  if (block.type === "tip") {
    return `<div class="tip-card" style="background:${accent}08;border:1px solid ${accent}30">
      <h3 style="color:${accent}">${escapeHtml(block.title)}</h3>
      <pre>${escapeHtml(block.content)}</pre>
    </div>`;
  }

  return `<div class="card ${isOpen ? 'open' : ''}" style="--accent:${accent};--accent-40:${accent}40">
    <div class="card-header" onclick="toggleCard('${cardId}')">
      <h3>${escapeHtml(block.title)}</h3>
      <span class="card-toggle ${isOpen ? 'open' : ''}">▼</span>
    </div>
    ${isOpen ? `<div class="card-body">
      <div class="card-text">${renderContent(block.content)}</div>
      ${block.code ? `<div class="code-block" id="code-${cardId}"><button class="copy-btn" onclick="copyCode(event, '${cardId}')">Copier</button>${escapeHtml(block.code)}</div>` : ''}
      ${block.why ? `<div class="why-box" style="--accent:${accent};background:${accent}08"><strong>💡 Pourquoi : </strong>${escapeHtml(block.why)}</div>` : ''}
    </div>` : ''}
  </div>`;
}

function render() {
  const phase = phases.find(p => p.id === activePhase);

  // Nav
  document.getElementById("nav").innerHTML = phases.map(p => {
    const isActive = p.id === activePhase;
    return `<button class="nav-btn ${isActive ? 'active' : ''}" 
      style="${isActive ? `background:${p.accent}` : ''}" 
      onclick="setPhase('${p.id}')">
      <span class="nav-icon">${p.icon}</span>
      <span>${escapeHtml(p.title.replace(/Phase \d — /, ""))}</span>
    </button>`;
  }).join("");

  // Content
  document.getElementById("content").innerHTML = `
    <div class="phase-header">
      <span class="phase-header-icon">${phase.icon}</span>
      <div>
        <h2>${escapeHtml(phase.title)}</h2>
        <div class="phase-bar" style="background:${phase.accent}"></div>
      </div>
    </div>
    ${phase.blocks.map((b, i) => renderBlock(b, phase.accent, i)).join("")}
  `;
}

// ─── ACTIONS ──────────────────────────────────────────
function setPhase(id) {
  activePhase = id;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleCard(cardId) {
  openCards[cardId] = !openCards[cardId];
  render();
}

function copyCode(e, cardId) {
  e.stopPropagation();
  const el = document.getElementById("code-" + cardId);
  if (!el) return;
  const text = el.textContent.replace("Copier", "").replace("Copié ✓", "").trim();
  navigator.clipboard.writeText(text).then(() => {
    const btn = el.querySelector(".copy-btn");
    btn.textContent = "Copié ✓";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copier"; btn.classList.remove("copied"); }, 2000);
  });
}

// ─── INIT ─────────────────────────────────────────────
render();
</script>
